<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="editor.css">
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <title>Pro Video Editor</title>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="tool-box" onclick="document.getElementById('file-input').click()">Images Upload</div>
<input type="file" id="file-input" multiple accept="image/*" style="display:none" onchange="handleImageUpload(event)">
            <div class="tool-box">Effects</div>
            <div class="tool-box" id="export-btn" onclick="exportVideo()">Export Video</div>

        <main class="viewport">
    <div class="preview-area">
        <img id="active-preview" src="" alt="Preview" style="max-width: 100%; max-height: 100%; display: none;">
        
        <div id="video-canvas">Video Preview Screen</div>
    </div>
</main>

        <footer class="timeline">
            <div class="timeline-controls">
                </div>
        </footer>
    </div>
    <script src="editor.js"></script>
</body>
</html>
